name: Distribute Family Transactions

on:
  schedule:
    # Run at 23:30 UTC every day (end of day, after all transactions are entered)
    - cron: '30 23 * * *'

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  distribute-transactions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary
          pip install -r requirements.txt

      - name: Distribute family transactions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'False'
          ALLOWED_HOSTS: 'github-actions'
        run: |
          python manage.py distribute_family_transactions

      - name: Success notification
        if: success()
        run: |
          echo "Family transactions distributed successfully"
          echo "Run date: $(date)"

      - name: Failure notification
        if: failure()
        run: |
          echo "Error distributing family transactions"
          echo "Check the logs above for details"
          exit 1
